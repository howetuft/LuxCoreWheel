name: windows-clean-tree
description: LuxCore Python Wheels - Clean/update source tree for Windows build
runs:
  using: 'composite'
  steps:

    - name: Remove all Find*.cmake
      working-directory:  ${{ github.workspace }}
      run: |
        cd '${{ github.workspace }}\LuxCore\cmake\Packages'
        Remove-Item -Recurse -Force Find*.cmake
      shell: pwsh

    - name: Remove duplicate embedded libraries
      working-directory:  ${{ github.workspace }}\LuxCore
      run: |
        for lib in opencolorio yaml expat spdlog
        do
          echo "LuxCoreWheel - Removing '${lib}'"
          sed -i "/${lib}/d" src/slg/CMakeLists.txt
          rm -rf deps/${lib}*
        done
      shell: bash

    - name: Reference deps targets in CMakeLists
      working-directory:  ${{ github.workspace }}
      run: |
        link_statement="target_link_libraries(pyluxcore PRIVATE slg-core slg-film slg-kernels luxrays bcd opensubdiv openvdb TBB::TBB MINIZIP::minizip llvm-openmp::llvm-openmp spdlog::spdlog openimageio::openimageio PNG::PNG OpenColorIO::OpenColorIO embree c-blosc::c-blosc openexr::openexr oidn::oidn Boost::python Boost::atomic Boost::chrono Boost::system Boost::filesystem Boost::container Boost::date_time Boost::iostreams Boost::program_options Boost::random Boost::serialization Boost::thread boost::boost)"
        echo $link_statement >> LuxCore/src/luxcore/CMakeLists.txt
      shell: bash
