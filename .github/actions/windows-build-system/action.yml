      #shell: bash

    # We use editable mode, otherwise a random revision is computed and make
    # sccache inefficient

    - name: openimageio
      working-directory: ${{ github.workspace }}/externals/windows/openimageio
      run: |
        # Keep install before source, otherwise settings.build_type won't be set
        # when running layout()
        conan editable add .
        conan install . -s build_type=Release
        conan source .
        cp -R src/include .

        conan build .
        cp -R build/Release/lib .
        cp -R build/Release/include/* include

      shell: bash

    ## Debug
    #- uses: mxschmitt/action-tmate@v3


    - name: oidn
      working-directory: ${{ github.workspace }}/externals/windows/oidn
      run: |
        conan source .
        conan install .
        conan editable add .
      shell: bash

