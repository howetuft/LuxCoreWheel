name: windows-build-system
description: LuxCore Python Wheels - Build boost-python & boost-numpy for Windows build
inputs:
  job-id:
    description: 'Job unique identifier (for caching)'
    required: true
    type: string
runs:
  using: 'composite'
  steps:
    - name: Init environment
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "SCCACHE_C_CUSTOM_CACHE_BUSTER=${{ inputs.job-id }}" >> $GITHUB_ENV
        echo "SCCACHE_CONF=${GITHUB_WORKSPACE}/sccache_config" >> $GITHUB_ENV
        #echo "SCCACHE_DIRECT=False" >> $GITHUB_ENV
        echo "SCCACHE_ERROR_LOG=../../sccache.log" >> $GITHUB_ENV
        echo "SCCACHE_LOG=debug" >> $GITHUB_ENV
        echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
        echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
      shell: bash
    # Debug
    #- uses: mxschmitt/action-tmate@v3

    # Setup the build machine with the most recent versions of CMake and Ninja. Both are cached if not already: on subsequent runs both will be quickly restored from GitHub cache service.
    # https://github.com/lukka/run-vcpkg
    - uses: lukka/get-cmake@latest

    - name: Setup sccache
      id: sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    # For main compilation
    - uses: ilammy/msvc-dev-cmd@v1

    - name: Associate 7-zip to all archives
      run: |
        REM Check if 7zFM is available
        set _7zFMFolder=C:\Program Files\7-Zip\
        IF EXIST "%_7zFMFolder%\7zFM.exe" (goto _change_registry) else (goto _7zip_unavailable)

        :_7zip_unavailable
        echo                   7-Zip is unavailable. Please install
        goto EOF


        :_change_registry
        REG ADD HKEY_CLASSES_ROOT\7-Zip.zip /d "zip Archive" /f > nul
        REG ADD HKEY_CLASSES_ROOT\7-Zip.zip\DefaultIcon /d "C:\Program Files\7-Zip\7z.dll,4" /f > nul
        REG ADD HKEY_CLASSES_ROOT\7-Zip.zip\shell /f > nul
        REG ADD HKEY_CLASSES_ROOT\7-Zip.zip\shell\open /f > nul
        REG ADD HKEY_CLASSES_ROOT\7-Zip.zip\shell\open\command /d "\"C:\Program Files\7-Zip\7zFM.exe\" \"%%1\"" /f > nul

        REG ADD HKEY_CURRENT_USER\Software\Classes\7-Zip.zip /d "zip Archive" /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\7-Zip.zip\DefaultIcon /d "C:\Program Files\7-Zip\7z.dll,4" /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\7-Zip.zip\shell /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\7-Zip.zip\shell\open /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\7-Zip.zip\shell\open\command /d "\"C:\Program Files\7-Zip\7zFM.exe\" \"%%1\"" /f > nul

        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\7-Zip.zip /d "zip Archive" /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\7-Zip.zip\DefaultIcon /d "C:\Program Files\7-Zip\7z.dll,4" /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\7-Zip.zip\shell /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\7-Zip.zip\shell\open /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\7-Zip.zip\shell\open\command /d "\"C:\Program Files\7-Zip\7zFM.exe\" \"%%1\"" /f > nul

        REM The change in HKEY_CLASSES_ROOT is implemented to all users
        REM the change in HKEY_CURRENT_USER\Software\Classes\ is the the curretly logged in user

        REM Update for .7z
        REG ADD HKEY_CLASSES_ROOT\.7z /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.7z  /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.7z  /d 7-Zip.zip /f > nul
        REM Update for .zip
        REG ADD HKEY_CLASSES_ROOT\.zip /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.zip /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.zip /d 7-Zip.zip /f > nul
        REM Update for .rar
        REG ADD HKEY_CLASSES_ROOT\.rar /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.rar /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.rar /d 7-Zip.zip /f > nul
        REM Update for .gz
        REG ADD HKEY_CLASSES_ROOT\.gz /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.gz /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.gz /d 7-Zip.zip /f > nul
        REM Update for .tgz
        REG ADD HKEY_CLASSES_ROOT\.tgz /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.tgz /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.tgz /d 7-Zip.zip /f > nul
        REM Update for .tar
        REG ADD HKEY_CLASSES_ROOT\.tar /d 7-Zip.zip /f > nul
        REG ADD HKEY_CURRENT_USER\Software\Classes\.tar /d 7-Zip.zip /f > nul
        REG ADD HKEY_LOCAL_MACHINE\SOFTWARE\Classes\.tar /d 7-Zip.zip /f > nul

        :EOF
      shell: cmd

    # Initialize Conan with local packages
    - name: Initialize Conan
      working-directory: ${{ github.workspace }}/LuxCore
      env:
        PKG_CONFIG_PATH: .
      run: |
        # Copy profiles
        mkdir -p /c/users/runneradmin/.conan2/profiles
        cp ../conan_profile /c/users/runneradmin/.conan2/profiles/default
        cp ../conan_profile_libvpx /c/users/runneradmin/.conan2/profiles/libvpx

        cp ../conanfile.py .
        unset ORIGINAL_PATH
      shell: bash

    #- name: Create libvpx
      #working-directory: ${{ github.workspace }}/LuxCore
      #run: |
        #conan create --version=1.13.1 --profile=libvpx ../externals/windows/libvpx
        ##conan install --profile=libvpx --build=missing --requires=libvpx/1.13.1 -vvv
      #shell: pwsh

    - name: boost
      working-directory: ${{ github.workspace }}
      run: |
        echo "using msvc : : sccache.exe '${{ env.VCINSTALLDIR }}/bin/cl.exe' ;" >> /c/users/runneradmin/site-config.jam
        conan install \
          --requires boost/1.78.0 \
          --build=boost/1.78.0 \
          -o boost/*:without_atomic=False \
          -o boost/*:without_charconv=True \
          -o boost/*:without_chrono=False \
          -o boost/*:without_cobalt=True \
          -o boost/*:without_container=False \
          -o boost/*:without_context=True \
          -o boost/*:without_contract=True \
          -o boost/*:without_coroutine=True \
          -o boost/*:without_date_time=False \
          -o boost/*:without_exception=False \
          -o boost/*:without_fiber=True \
          -o boost/*:without_filesystem=False \
          -o boost/*:without_graph=True \
          -o boost/*:without_graph_parallel=True \
          -o boost/*:without_iostreams=False \
          -o boost/*:without_json=True \
          -o boost/*:without_locale=True \
          -o boost/*:without_log=True \
          -o boost/*:without_math=True \
          -o boost/*:without_mpi=True \
          -o boost/*:without_nowide=True \
          -o boost/*:without_program_options=False \
          -o boost/*:without_python=False \
          -o boost/*:without_random=False \
          -o boost/*:without_regex=False \
          -o boost/*:without_serialization=False \
          -o boost/*:without_stacktrace=True \
          -o boost/*:without_system=False \
          -o boost/*:without_test=True \
          -o boost/*:without_thread=False \
          -o boost/*:without_timer=True \
          -o boost/*:without_type_erasure=True \
          -o boost/*:without_url=True \
          -o boost/*:without_wave=True

      shell: bash

    - name: oidn
      working-directory: ${{ github.workspace }}/externals/windows/oidn
      run: |
        conan source .
        conan install .
        conan build .
        conan export-pkg .
      shell: bash

    - name: openimageio
      working-directory: ${{ github.workspace }}/externals/windows/openimageio
      run: |
        conan source .
        conan install .
        conan build .
        conan export-pkg .
      shell: bash

    #- uses: mxschmitt/action-tmate@v3

    - name: Run conan
      working-directory: ${{ github.workspace }}/LuxCore
      env:
        PKG_CONFIG_PATH: .
      run: |
        conan install --build=missing .  -s build_type=Release
      shell: bash

    # Copy config to project
    - name: "Install Config_Windows-Wheel.cmake"
      working-directory: '${{ github.workspace }}'
      run: |
        cp configs/Config_Windows-Wheel.cmake LuxCore/cmake/SpecializedConfig
      shell: bash
