name: all-build-system
description: LuxCore Python Wheels - Prepare build
inputs:
  job-id:
    description: 'Job unique identifier (for caching)'
    required: true
    type: string
runs:
  using: 'composite'
  steps:

    ## Initialize Conan with local packages
    #- name: Initialize Conan
      #working-directory: ${{ github.workspace }}/LuxCore
      #env:
        #PKG_CONFIG_PATH: .
      #run: |
        ## Copy profiles
        #_profile="${{ github.workspace }}/conan_profile_${RUNNER_OS}_${RUNNER_ARCH}"
        #echo "Copying profile ${_profile}"
        #mkdir -p ~/.conan2/profiles
        #cp ${_profile} ~/.conan2/profiles/default

        #cp ../conanfile.py .
        #unset ORIGINAL_PATH
      #shell: bash

    # Deploy profiles
    - name: Set conan profile
      working-directory: ${{ github.workspace }}/LuxCore
      env:
        PKG_CONFIG_PATH: .
      run: |
        set -o pipefail

        # Copy profiles
        _profile="${{ github.workspace }}/conan_profile_${RUNNER_OS}_${RUNNER_ARCH}"
        echo "Copying profile ${_profile}"
        mkdir -p ~/.conan2/profiles
        cp ${_profile} ~/.conan2/profiles/default

        cp ../conanfile.py .
        unset ORIGINAL_PATH
      shell: bash

    - uses: lukka/get-cmake@latest
      if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')

    - name: Setup sccache
      if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
      id: sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    # For windows compilation
    - uses: ilammy/msvc-dev-cmd@v1
      if: startsWith(matrix.os, 'windows')

    - name: Bison
      if: startsWith(matrix.os, 'macos')
      run: |
        brew install bison
        echo "BISON_ROOT=$(brew --prefix bison)" >> $GITHUB_ENV
      shell: bash
