name: all-build-system
description: LuxCore Python Wheels - Prepare build
inputs:
  job-id:
    description: 'Job unique identifier (for caching)'
    required: true
    type: string
runs:
  using: 'composite'
  steps:

    - name: Init environment
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "SCCACHE_C_CUSTOM_CACHE_BUSTER=${{ inputs.job-id }}" >> $GITHUB_ENV
        echo "SCCACHE_CONF=${GITHUB_WORKSPACE}/sccache_config" >> $GITHUB_ENV
        echo "SCCACHE_ERROR_LOG=${{ github.workspace }}/sccache.log" >> $GITHUB_ENV
        # LogLevel in {error, warn, info, debug, trace}, see parse.rs
        echo "SCCACHE_LOG=debug" >> $GITHUB_ENV
        echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
        echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
        echo "BOOST_INSTALL_LAYOUT=system" >> $GITHUB_ENV
      shell: bash

    ## Initialize Conan with local packages
    #- name: Initialize Conan
      #working-directory: ${{ github.workspace }}/LuxCore
      #env:
        #PKG_CONFIG_PATH: .
      #run: |
        ## Copy profiles
        #_profile="${{ github.workspace }}/conan_profile_${RUNNER_OS}_${RUNNER_ARCH}"
        #echo "Copying profile ${_profile}"
        #mkdir -p ~/.conan2/profiles
        #cp ${_profile} ~/.conan2/profiles/default

        #cp ../conanfile.py .
        #unset ORIGINAL_PATH
      #shell: bash

    # Deploy profiles
    - name: Set conan profile
      working-directory: ${{ github.workspace }}/LuxCore
      env:
        PKG_CONFIG_PATH: .
      run: |
        set -o pipefail

        # Copy profiles
        _profile="${{ github.workspace }}/conan_profile_${RUNNER_OS}_${RUNNER_ARCH}"
        echo "Copying profile ${_profile}"
        mkdir -p ~/.conan2/profiles
        cp ${_profile} ~/.conan2/profiles/default

        cp ../conanfile.py .
        unset ORIGINAL_PATH
      shell: bash

    - uses: lukka/get-cmake@latest
      if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')

    - name: Setup sccache
      if: startsWith(matrix.os, 'macos') || startsWith(matrix.os, 'windows')
      id: sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    # For windows compilation
    - uses: ilammy/msvc-dev-cmd@v1
      if: startsWith(matrix.os, 'windows')

